  <path d="M 352 512 L 409 512" fill="none" stroke="#e7ff8b" stroke-linecap="round" stroke-width="8" opacity="0.82"/>
  <circle cx="790" cy="286" r="27" fill="url(#terminal)"/>
  <circle cx="792" cy="512" r="28" fill="url(#terminal)"/>
