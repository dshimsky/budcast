<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">BudCast Signal Mark Refinement B</title>
  <desc id="desc">A marketplace-oriented BudCast symbol with a larger creator node, directional broadcast arcs, and deliberately uneven terminal spacing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090907"/>
      <stop offset="0.55" stop-color="#10180d"/>
      <stop offset="1" stop-color="#060705"/>
    </linearGradient>
    <radialGradient id="node" cx="32%" cy="27%" r="80%">
      <stop offset="0" stop-color="#f7ffd9"/>
      <stop offset="0.36" stop-color="#c8f060"/>
      <stop offset="0.7" stop-color="#71c956"/>
      <stop offset="1" stop-color="#2f6838"/>
    </radialGradient>
    <linearGradient id="signal" x1="320" y1="298" x2="824" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e5ff8b"/>
      <stop offset="0.42" stop-color="#c8f060"/>
      <stop offset="1" stop-color="#72d238"/>
    </linearGradient>
